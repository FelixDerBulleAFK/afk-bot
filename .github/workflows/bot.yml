name: afkbot

on:
  workflow_dispatch:  # manuelles Starten
  schedule:
    - cron: "*/30 * * * *"  # alle 30 Minuten neu starten

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Node.js setup
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: npm install bedrock-protocol
      - run: node bot.js
